name: Daily description check

on:
  schedule:
    # codziennie o 06:15 czasu UTC (w PL zwykle 07:15 lub 08:15 zależnie od zmiany czasu)
    - cron: "15 6 * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run checker
        id: runcheck
        run: |
          python check_descriptions.py

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: description-report
          path: outputs/
